<!doctype.html>
   <html lang="en">
    <head><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body { margin: 0px;
       background: black;}

/* Header section */

header { height: 50px;
        width: 100%;
        padding: 5px;
         background: gray;
         color: white;
         display: flex;
         justify-content: space-between;
         align-items: center;
         position: fixed;
         top: 0px; left: 0px;
         box-shadow: 0 0 15px cyan;
         z-index: 999;
         box-sizing: border-box;}

h2 { color: white;}

#menu { font-size: 40px;}
#menu:active { transform: scale(1.05);
               cursor: pointer;}

.search { height: 30px;
          width: 200px;
          border-radius: 10px;
          border-style: none;
          outline: none;}
.search:focus { border: 2px solid cyan;}
#search-icon:active { transform: scale(1.05);
                 cursor: pointer;}
#search-icon { font-size: 40px;}

/* Navigation Section */
nav {
      width: 80%;
       height: 100vh;
       background: gray;
       color: white;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 10px;
        gap: 30px;
        position: fixed;
        left: 0px; top: 50px;
        box-shadow: 0 0 15px cyan;
        transform: translateX(-100%);
        transition: transform 0.9s ease;
        z-index: 1;}
        
nav.active { transform: translateX(0);}

.btn { font-size: 20px;
      height: 40px;
       background: transparent;
       border-style: none;
       color: white;}
.btn:hover { background: cyan;
             transform: scale(1.09);
             transition: transform 0.9s ease;}
             
.btn1 { height: 50px;
        width: 250px;
        background: transparent;
        font-size: 20px;
        border-radius: 15px;
        border-color: cyan;
        color: white;}
        
.btn1:hover { background: cyan;
        transform: scale(1.09);
        transition: transform 0.5s ease;
        box-shadow: 0 0 15px cyan;
}

.login { display: flex;
         flex-direction: column;
         align-items: center;
         gap: 20px;
         width: 100%;}
  
/* Login Form */
.form1 { margin-top: 50px;
         display: flex;
         flex-direction: column;
         align-items: center;
         background-image: url('suave1.jpeg');
         height: 100vh;
         width: 100%;}
         
form {display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         text-align: left;
         gap: 30px;
         border-style: solid;
         border-radius: 15px;
         border-color: cyan;
         width: 80%;
         height: 500px;
         backdrop-filter: blur(10px);
         -webkit-backdrop-filter: blur(10px);}

.label1 { color: white;
          font-size: 20px;}
    
h1 {color: white;}

.user { height: 50px;
        border-style: none;
        border-radius: 10px;
        outline: none;
        width: 100%;}

.user:focus { border: 2px solid red;}

.submit { height: 50px;
          background: transparent;
          border-style: solid;
          border-color: cyan;
          border-radius: 10px;
          color: white;
          width: 80%;}
          
.submit:hover { background: cyan;
               transition: transform 0.5s ease;
               transform: scale(1.05);}
.checkbox-section { display: flex;
            align-items: center;
            gap: 5px;}

strong { color: cyan;}

p { color: white;}
a { text-decoration: none;}

.register { display: flex;
           gap: 5px;
           align-items: center;}
.input { display: flex;
         flex-direction: column;
         gap:10px;
         align-items: flex-start;
         width: 80%;}



  
  
  
  
</style>
</head>
<body>
  <!header section>
  <header>
        <img src="sauve.png" width="100px" height="50px" alt="myself" />
      
      
<input type="text" class="search" /> 
  <span class="material-icons" id="search-icon">search</span> 
       
 <span id="menu" class="material-icons"> menu</span>
    
  </header>

<! Navigation Section >

<nav id="nav">

    <h2> Suave Trading</h2>
    
  <a href="index.html"><button class="btn">
    Home</button></a>
     
  <button class="btn" >
   Dashboard</button>
   
    
  <button class="btn">
    Pricing</button>
   
  <button class="btn">
    Contact</button>
   
  <button class="btn">
    About</button>
  
<div class="login">
 <a href="login.html"><button class="btn1">Login</button></a>
 
 <button class="btn1">Sign Up</button>
  
</div>
</nav>

<! Main Section >

<main class="form1">
 <h1>Sauve Trading</h1>
  <form>
     <div class="input">
   <label for="user" class="label1">Email</label>
      <input type="text" class="user"
      />
      </div>
      
    <div class="input">
      <label for="pass" class="label1">Password</label>
<input type="text" class="user" />
</div>


<div class="checkbox-section">
<input type="checkbox" value="yes" class="checkbox">
<p>Remember me</p>
<a href="Forgotpassword.html"><strong>Forgot Password?</strong></a>
</div>
 
  <button type="submit" class="submit">Login</button>
 
 <div class="register">
<p>Don't have an account? </p> 
<a href="Register.html"><strong>Register</strong></a>
</div>
      
    
    
    
  </form>
  


    </main>
  
  
  
  
  
  <script>
    
// toggle menu //
const menu = document.getElementById("menu");
const nav = document.getElementById("nav");

let open = false;

menu.addEventListener("click", () => {
  open = !open;

  nav.classList.toggle("active");

  // change icon
  menu.textContent = open ? "close" : "menu";
});
  </script>
</body>
</html>
