<! Main Section >

<main class="main1">
  <h1>Create An Account</h1>

<form id="signupForm">
  
  <div class="user1">
  <label for="fullname" class="user">Full Name</label>
  <input type="text" placeholder="Enter full name" id="fullName" class="input">
  <small id="nameError"></small>
  </div>
  
  <div class="user1">
  <label for="email" class="user">Email</label>
  <input type="email" placeholder="Enter email" id="email" class="input">
    <small id="emailError"></small>
  </div>
  
  <div class="user1">
  <label for="password">Password</label>
  <input type="password" placeholder="password" id="password" class="input">
  <small id="passwordError"></small>
  </div>
  
  <div class="user1">
  <label for="Date" class="user">Date of Birth</label>
  <input type="date" placeholder="DOB"
  class="input" id="dob">
  <small id="dobError"></small>

  </div>
  
  <div class="user1">
  <label for="tel" class="user" >Phone</label>
  <input type="tel" placeholder="phone"
  class="input" id="phone">
  <small id="phoneError"></small>
 </div>
 
 
<div class="checkbox">
  <input type="checkbox" value="yes" id="terms">
  <p>Agree to terms </p>
   </div>
 <small id="termsError"></small>
 
  <button type="submit" class="btn1" id="submitBtn">
  <span id="btnText">Create Account</span><span id="spinner" class="spinner hidden"></span>
</button>
  
  <div class="already-account">
  <p>Have an account?</p>
  <a href="login.html"><strong>Login</strong></a>
  </div>
  
</form>
